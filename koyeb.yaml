# Koyeb deployment config
# Docs: https://www.koyeb.com/docs/deploy-with-koyeb-yaml
services:
  - name: tv-station
    docker:
      dockerfile_path: Dockerfile
    ports:
      - port: 8080
        protocol: http
    routes:
      - path: /
        port: 8080
    health:
      http:
        path: /healthz
        port: 8080
    env:
      - key: DATABASE_URL
        value: file:/app/db/custom.db
      - key: ADMIN_PASSWORD
        value: change-me
      - key: NODE_ENV
        value: production
    # Persistent volume for the SQLite DB
    volumes:
      - name: db
        mount_path: /app/db
        size: 1G
    regions:
      - fra
    instance_type: free
    autoscaling:
      min: 1
      max: 1
